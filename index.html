<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumina Archives — Circulation & Records</title>
    <meta name="description" content="Lumina Archives circulation system — browse the collection, manage loans, and track records." />
    <meta name="theme-color" content="#f5f0e6" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%237a3b2e'/%3E%3Cpath d='M6 6.2c1.7-1 3.7-1 5.4 0v11.6c-1.7-1-3.7-1-5.4 0V6.2Z' fill='none' stroke='%23f5f0e6' stroke-width='1.3' stroke-linejoin='round'/%3E%3Cpath d='M18 6.2c-1.7-1-3.7-1-5.4 0v11.6c1.7-1 3.7-1 5.4 0V6.2Z' fill='none' stroke='%23f5f0e6' stroke-width='1.3' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a class="skip-link" href="#view">Skip to content</a>

    <div id="auth-screen" class="auth-screen hidden">
      <div class="auth-card">
        <div class="auth-brand">
          <div class="logo-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="26" height="26"><path d="M6 6.2c1.7-1 3.7-1 5.4 0v11.6c-1.7-1-3.7-1-5.4 0V6.2Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M18 6.2c-1.7-1-3.7-1-5.4 0v11.6c1.7-1 3.7-1 5.4 0V6.2Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </div>
          <h1>Lumina Archives</h1>
          <p class="muted">A quiet corner for every reader.</p>
        </div>
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="login" role="tab" aria-selected="true">Sign in</button>
          <button class="tab" data-tab="register" role="tab" aria-selected="false">Create account</button>
        </div>
        <form id="login-form" class="auth-form" novalidate>
          <label>Email<input type="email" name="email" required autocomplete="email" /></label>
          <label>Password<input type="password" name="password" required autocomplete="current-password" /></label>
          <button class="btn btn-primary" type="submit">Sign in</button>
        </form>
        <form id="register-form" class="auth-form hidden" novalidate>
          <label>Full name<input type="text" name="name" required /></label>
          <label>Email<input type="email" name="email" required /></label>
          <label>Password<input type="password" name="password" minlength="4" required /></label>
          <button class="btn btn-primary" type="submit">Create account</button>
        </form>
      </div>
    </div>

    <div id="app" class="app hidden">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M6 6.2c1.7-1 3.7-1 5.4 0v11.6c-1.7-1-3.7-1-5.4 0V6.2Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M18 6.2c-1.7-1-3.7-1-5.4 0v11.6c1.7-1 3.7-1 5.4 0V6.2Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <div class="brand-name">Lumina Archives</div>
            <div class="brand-sub">Library System</div>
          </div>
        </div>
        <nav id="nav" class="nav" aria-label="Primary">
          <button class="nav-btn" data-view="dashboard" title="Dashboard"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M4 11.5 12 4l8 7.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10v9a1 1 0 0 0 1 1h3v-6h4v6h3a1 1 0 0 0 1-1v-9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Dashboard</button>
          <button class="nav-btn" data-view="books" title="Books"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M4 5.5C4 4.7 4.7 4 5.5 4H9a2 2 0 0 1 2 2v14a1.5 1.5 0 0 0-1.5-1.5H5.5A1.5 1.5 0 0 1 4 17V5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M20 5.5c0-.8-.7-1.5-1.5-1.5H15a2 2 0 0 0-2 2v14a1.5 1.5 0 0 1 1.5-1.5h3.5A1.5 1.5 0 0 0 20 17V5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg> Books</button>
          <button class="nav-btn" data-view="mine" title="My Loans"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M6 3.5A1.5 1.5 0 0 1 7.5 2h9A1.5 1.5 0 0 1 18 3.5V21l-6-4-6 4V3.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg> My Loans</button>
          <button class="nav-btn admin-only" data-view="history" title="History"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="8.4" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 7.6V12l3 2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> History</button>
          <button class="nav-btn admin-only" data-view="users" title="Patrons"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="9" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 20c.4-3.3 2.7-5.5 5.5-5.5s5.1 2.2 5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="17.3" cy="9" r="2.1" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M15.6 14.8c1.9.5 3.3 2.2 3.6 4.7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg> Patrons</button>
          <button class="nav-btn admin-only" data-view="settings" title="Settings"><svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="3.1" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 3v2.6M12 18.4V21M21 12h-2.6M5.6 12H3M18.6 5.4l-1.8 1.8M7.2 16.8l-1.8 1.8M18.6 18.6l-1.8-1.8M7.2 7.2 5.4 5.4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg> Settings</button>
        </nav>
        <div class="sidebar-foot">
          <button id="theme-toggle" class="btn btn-ghost" title="Toggle Dark Mode" style="width: 100%; justify-content: center; margin-bottom: 8px;">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> Toggle Theme
          </button>
          <button id="user-chip" class="user-chip" title="Edit your account">
            <div class="avatar" id="user-avatar">?</div>
            <div class="user-chip-text">
              <div id="user-name" class="user-name">—</div>
              <div id="user-role" class="user-role muted">—</div>
            </div>
          </button>
          <button id="logout-btn" class="btn btn-ghost"><svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M9 20H5.5A1.5 1.5 0 0 1 4 18.5v-13A1.5 1.5 0 0 1 5.5 4H9" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 16l4-4-4-4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><line x1="19" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg> Sign out</button>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <h2 id="view-title">Dashboard</h2>
          <div id="topbar-actions" class="topbar-actions"></div>
        </header>
        <div id="notification-banner"></div>
        <section id="view" class="view" tabindex="-1"></section>
      </main>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root" role="status" aria-live="polite" aria-atomic="false"></div>
    <script src="./script.js"></script>
  </body>
</html>
